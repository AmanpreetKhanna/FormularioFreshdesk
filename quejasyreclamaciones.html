<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freshworks Widget Page</title>
    <script src="https://code.jquery.com/jquery-1.9.1.min.js"></script>
</head>

<body>

    <script>
        window.fwSettings = {
            'widget_id': 101000008738,
            'locale': 'es'
        };
        !function () {
            if (typeof window.FreshworksWidget !== "function") {
                var n = function () { n.q.push(arguments) };
                n.q = [];
                window.FreshworksWidget = n;
            }
        }();
    </script>

    <script>
        var tag = document.createElement("script");

        function scriptLoad() {
            tag.src = "https://euc-widget.freshworks.com/widgets/101000008738.js";
            document.getElementsByTagName('head')[0].appendChild(tag);
        }
    </script>

    <script>
        function openWidget() {
            FreshworksWidget('open');
        }
    </script>

    <style>
        @media (min-width: 768px) {
            #fd_createtkt {
                color: white;
                background-color: #03787c;
                font-weight: 600;
                padding: 10px 20px;
                border: none;
                transition: background 0.55s ease;
                margin-left: 45%;
            }
        }

        @media (max-width: 767px) {
            #fd_createtkt {
                color: white;
                background-color: #03787c;
                font-weight: 600;
                padding: 10px 20px;
                border: none;
                transition: background 0.55s ease;
                margin-left: 40%;
            }
        }

        @media (max-width: 479px) {
            #fd_createtkt {
                color: white;
                background-color: #03787c;
                font-weight: 600;
                padding: 10px 20px;
                border: none;
                transition: background 0.55s ease;
                margin-left: 35%;
            }
        }
    </style>

    <!--   <button type="button" id="fd_createtkt">Crear Ticket</button> -->

    <script>
        $(document).ready(function () {
            scriptLoad();
            FreshworksWidget('hide', 'launcher');
            // $("#fd_createtkt").click(function () {
            //     openWidget();
            // });
            openWidget();
        });
    </script>

</body>

</html>
